name: Automation Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  test:

    runs-on: ubuntu-latest

    environment: test-suite

    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      USER_CRED: ${{ secrets.USER_CRED }}
      PASS_CRED: ${{ secrets.PASS_CRED }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: |
          playwright install --with-deps

      - name: Run API Tests
        run: |
          pytest tests/api --html=api_report.html --self-contained-html

      - name: Run UI Tests
        run: |
          pytest tests/ui --html=ui_report.html --self-contained-html

      - name: Upload API Report
        uses: actions/upload-artifact@v4
        with:
          name: api-html-report
          path: api_report.html

      - name: Upload UI Report
        uses: actions/upload-artifact@v4
        with:
          name: ui-html-report
          path: ui_report.html